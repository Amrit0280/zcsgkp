<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Faculty</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --ink: #1A1410;
    --gold: #C9973A;
    --gold-light: #E8C47A;
    --muted: #8A7E72;
    --card-bg: #FFFFFF;
    --border: rgba(201,151,58,0.18);
    --shadow: 0 2px 24px rgba(26,20,16,0.07), 0 1px 4px rgba(26,20,16,0.05);
    --shadow-hover: 0 12px 40px rgba(26,20,16,0.13), 0 2px 8px rgba(201,151,58,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Noise overlay ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .5;
  }

  /* ─── Hero Header ─── */
  header {
    position: relative;
    padding: 80px 24px 60px;
    text-align: center;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% -10%, rgba(201,151,58,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(201,151,58,0.09) 0%, transparent 60%);
    pointer-events: none;
  }

  .header-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 20px;
  }
  .header-eyebrow::before, .header-eyebrow::after {
    content: ''; display: block;
    width: 32px; height: 1px; background: var(--gold-light);
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(42px, 7vw, 76px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  header h1 em {
    font-style: italic; color: var(--gold);
  }

  header p {
    margin-top: 16px;
    font-size: 15px; font-weight: 300;
    color: var(--muted); max-width: 420px; margin-inline: auto;
    line-height: 1.7;
  }

  /* ─── Controls ─── */
  .controls {
    position: relative; z-index: 2;
    max-width: 1200px; margin: 0 auto 48px;
    padding: 0 24px;
    display: flex; flex-wrap: wrap; gap: 12px;
    align-items: center; justify-content: space-between;
  }

  .search-wrap {
    position: relative; flex: 1; min-width: 240px; max-width: 380px;
  }
  .search-wrap svg {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  #searchInput {
    width: 100%; padding: 13px 18px 13px 46px;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    background: rgba(255,255,255,0.85);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--ink);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    backdrop-filter: blur(8px);
  }
  #searchInput:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,151,58,0.12);
  }
  #searchInput::placeholder { color: #BFB6AC; }

  .filter-pills {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .pill {
    padding: 8px 18px;
    border-radius: 50px;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--muted); cursor: pointer;
    transition: all .2s;
    backdrop-filter: blur(8px);
  }
  .pill:hover { border-color: var(--gold); color: var(--gold); }
  .pill.active {
    background: var(--gold); border-color: var(--gold);
    color: #fff; font-weight: 600;
  }

  /* ─── Stats bar ─── */
  .stats-bar {
    max-width: 1200px; margin: 0 auto 16px;
    padding: 0 24px;
    font-size: 13px; color: var(--muted);
  }
  #resultCount { color: var(--gold); font-weight: 600; }

  /* ─── Grid ─── */
  .grid {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: 0 24px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  /* ─── Card ─── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px 24px;
    position: relative; overflow: hidden;
    cursor: default;
    box-shadow: var(--shadow);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease, border-color .3s;
    animation: fadeUp .5s ease both;
  }
  .card:hover {
    transform: translateY(-6px) scale(1.012);
    box-shadow: var(--shadow-hover);
    border-color: rgba(201,151,58,0.35);
  }

  /* Accent line */
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transform: scaleX(0); transform-origin: left;
    transition: transform .35s ease;
  }
  .card:hover::before { transform: scaleX(1); }

  /* Serial number watermark */
  .card-num {
    position: absolute; top: 18px; right: 20px;
    font-family: 'DM Serif Display', serif;
    font-size: 13px; color: rgba(201,151,58,0.3);
    font-style: italic;
  }

  /* Avatar */
  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: #fff;
    margin-bottom: 16px;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(201,151,58,0.35);
  }

  .card-name {
    font-size: 16px; font-weight: 600;
    line-height: 1.3; color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .badge {
    display: inline-block;
    padding: 4px 11px;
    border-radius: 50px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 12px;
  }
  /* Designation-specific badge colors */
  .badge-principal  { background: #FEF3C7; color: #92400E; }
  .badge-coordinator{ background: #EDE9FE; color: #5B21B6; }
  .badge-pgt        { background: #D1FAE5; color: #065F46; }
  .badge-tgt        { background: #DBEAFE; color: #1E40AF; }
  .badge-prt        { background: #FCE7F3; color: #9D174D; }
  .badge-ntt        { background: #FEF9C3; color: #713F12; }
  .badge-pet        { background: #FFEDD5; color: #9A3412; }
  .badge-clerk      { background: #F1F5F9; color: #475569; }

  .card-qual {
    display: flex; align-items: flex-start; gap: 7px;
    font-size: 13px; color: var(--muted); font-weight: 300;
    line-height: 1.5;
  }
  .card-qual svg { flex-shrink: 0; margin-top: 3px; }

  /* Hidden cards */
  .card.hidden {
    display: none;
  }

  /* ─── No results ─── */
  .no-results {
    grid-column: 1/-1;
    text-align: center; padding: 80px 20px;
    display: none;
  }
  .no-results.show { display: block; }
  .no-results-icon {
    font-family: 'DM Serif Display', serif;
    font-size: 64px; opacity: .15; color: var(--gold);
  }
  .no-results p { color: var(--muted); margin-top: 12px; font-size: 15px; }

  /* ─── Footer ─── */
  footer {
    text-align: center; padding: 32px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: #C0B9B1;
    letter-spacing: 0.04em;
  }

  /* ─── Animation ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:nth-child(1)  { animation-delay:.04s }
  .card:nth-child(2)  { animation-delay:.07s }
  .card:nth-child(3)  { animation-delay:.10s }
  .card:nth-child(4)  { animation-delay:.13s }
  .card:nth-child(5)  { animation-delay:.16s }
  .card:nth-child(6)  { animation-delay:.19s }
  .card:nth-child(7)  { animation-delay:.22s }
  .card:nth-child(8)  { animation-delay:.25s }
  .card:nth-child(9)  { animation-delay:.27s }
  .card:nth-child(10) { animation-delay:.29s }
  .card:nth-child(n+11){ animation-delay:.32s }

  /* ─── Responsive ─── */
  @media (max-width: 600px) {
    .controls { flex-direction: column; align-items: stretch; }
    .search-wrap { max-width: 100%; }
    .grid { grid-template-columns: 1fr; gap: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Academic Excellence</div>
  <h1>Our <em>Faculty</em></h1>
  <p>Meet the dedicated educators shaping minds and building futures.</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search by name or qualification…">
  </div>
  <div class="filter-pills" id="filterPills">
    <button class="pill active" data-filter="all">All</button>
    <button class="pill" data-filter="principal">Principal</button>
    <button class="pill" data-filter="coordinator">Coordinator</button>
    <button class="pill" data-filter="pgt">PGT</button>
    <button class="pill" data-filter="tgt">TGT</button>
    <button class="pill" data-filter="prt">PRT</button>
    <button class="pill" data-filter="ntt">NTT</button>
    <button class="pill" data-filter="pet">PET</button>
    <button class="pill" data-filter="clerk">Clerk</button>
  </div>
</div>

<div class="stats-bar">
  Showing <span id="resultCount">46</span> faculty members
</div>

<div class="grid" id="facultyGrid">

  <!-- Cards generated below -->
</div>

<footer>© 2025 Faculty Directory &nbsp;·&nbsp; All rights reserved</footer>

<script>
const faculty = [
  {no:1,  name:"Dr. Seema Rai",          desig:"Principal",   qual:"M.Sc, B.Ed"},
  {no:2,  name:"Mr. Akash Paul",         desig:"Coordinator", qual:"MBA"},
  {no:3,  name:"Mr. Arvind Singh",       desig:"PGT",         qual:"M.Sc, B.Ed"},
  {no:4,  name:"Mr. K.K Rawat",          desig:"PGT",         qual:"MA, B.Ed"},
  {no:5,  name:"Mr. Akhilesh Tripathi",  desig:"PGT",         qual:"M.Sc, B.Ed, MBA"},
  {no:6,  name:"Mr. Amar Thapa",         desig:"PGT",         qual:"M.Com, B.Ed"},
  {no:7,  name:"Mr. Bechan Prasad",      desig:"PGT",         qual:"MA, B.Ed"},
  {no:8,  name:"Mr. Rajnish Kumar Chaubey",desig:"PGT",       qual:"M.Sc, B.Ed"},
  {no:9,  name:"Mr. Chandan",            desig:"PGT",         qual:"M.Com, B.Ed, MBA"},
  {no:10, name:"Mr. Rajan Kumar",        desig:"PGT",         qual:"MA, B.Ed"},
  {no:11, name:"Mr. Raj Kishore Verma",  desig:"PGT",         qual:"M.Sc, B.Ed"},
  {no:12, name:"Mr. Shravan",            desig:"PGT",         qual:"M.Sc, B.Ed"},
  {no:13, name:"Mr. Arun Kumar Singh",   desig:"TGT",         qual:"BA, B.Ed"},
  {no:14, name:"Mrs. Lilawati",          desig:"TGT",         qual:"MA, B.Ed"},
  {no:15, name:"Mrs. Priyanka Pandey",   desig:"TGT",         qual:"B.Tech, B.Ed"},
  {no:16, name:"Mrs. Priyanka Pandey",   desig:"TGT",         qual:"B.Sc, B.Ed"},
  {no:17, name:"Mr. Rakesh Singh",       desig:"TGT",         qual:"B.Sc, B.Ed"},
  {no:18, name:"Mrs. Swarnlata",         desig:"TGT",         qual:"MA, B.Ed"},
  {no:19, name:"Mrs. Sarita Sonkar",     desig:"TGT",         qual:"MA, Bombay Art"},
  {no:20, name:"Ms. Indu",              desig:"TGT",         qual:"M.Sc, B.Ed"},
  {no:21, name:"Mrs. Sarita",           desig:"TGT",         qual:"M.Com, B.Ed"},
  {no:22, name:"Ms. Preeti Singh",      desig:"TGT",         qual:"M.Com, B.Ed"},
  {no:23, name:"Mr. Yogesh",            desig:"TGT",         qual:"BA, B.Ed"},
  {no:24, name:"Mrs. Priti Gupta",      desig:"TGT",         qual:"MA, Prabhakar"},
  {no:25, name:"Mrs. Ranjeeta",         desig:"PRT",         qual:"MA, B.Ed"},
  {no:26, name:"Ms. Sushmita",          desig:"PRT",         qual:"MCA"},
  {no:27, name:"Mrs. Pramila Maurya",   desig:"PRT",         qual:"MA, D.El.Ed"},
  {no:28, name:"Mrs. Priya Sahani",     desig:"PRT",         qual:"M.Com, B.Ed"},
  {no:29, name:"Ms. Shalu Tripathi",    desig:"PRT",         qual:"B.Sc, D.El.Ed"},
  {no:30, name:"Mrs. Kumkum",           desig:"PRT",         qual:"B.Com"},
  {no:31, name:"Ms. Priya Dubey",       desig:"PRT",         qual:"M.Com, B.Ed"},
  {no:32, name:"Ms. Shweta Singh",      desig:"PRT",         qual:"M.Com, B.Ed"},
  {no:33, name:"Mrs. Madhuri Sharma",   desig:"PRT",         qual:"BCA, B.Ed"},
  {no:34, name:"Mrs. Preeti Kumari",    desig:"PRT",         qual:"B.Com"},
  {no:35, name:"Mrs. Neelam Dwivedi",   desig:"NTT",         qual:"BA, B.Ed"},
  {no:36, name:"Mrs. Neelam Shahi",     desig:"NTT",         qual:"MA, B.Ed"},
  {no:37, name:"Ms. Shradha Singh",     desig:"NTT",         qual:"B.Com, B.Ed"},
  {no:38, name:"Ms. Payal Sharma",      desig:"NTT",         qual:"B.Sc, DCA, D.El.Ed"},
  {no:39, name:"Ms. Shreya Mishra",     desig:"NTT",         qual:"B.Com, B.Ed"},
  {no:40, name:"Ms. Alpana Singh",      desig:"NTT",         qual:"B.Sc, D.El.Ed"},
  {no:41, name:"Mr. Upendra",           desig:"PET",         qual:"M.Ped"},
  {no:42, name:"Mr. Mohit",             desig:"PET",         qual:"B.P.Ed"},
  {no:43, name:"Ms. Mamta Thapa",       desig:"PET",         qual:"BA, B.P.Ed"},
  {no:44, name:"Mr. Aditya Pratap",     desig:"PET",         qual:"BA, B.P.Ed"},
  {no:45, name:"Mr. Ajay",              desig:"Clerk",       qual:"B.Com"},
  {no:46, name:"Ms. Sudhir",            desig:"Clerk",       qual:"B.Com"},
];

function initials(name) {
  return name.replace(/^(Dr\.|Mr\.|Mrs\.|Ms\.)\s*/i,'').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function badgeClass(desig) {
  const map = {
    Principal:'principal', Coordinator:'coordinator',
    PGT:'pgt', TGT:'tgt', PRT:'prt',
    NTT:'ntt', PET:'pet', Clerk:'clerk'
  };
  return 'badge badge-' + (map[desig] || 'clerk');
}

const grid = document.getElementById('facultyGrid');

// Render all cards
faculty.forEach(f => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.name = f.name.toLowerCase();
  card.dataset.desig = f.desig.toLowerCase();
  card.dataset.qual = f.qual.toLowerCase();
  card.innerHTML = `
    <span class="card-num">#${String(f.no).padStart(2,'0')}</span>
    <div class="avatar">${initials(f.name)}</div>
    <div class="card-name">${f.name}</div>
    <span class="${badgeClass(f.desig)}">${f.desig}</span>
    <div class="card-qual">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      ${f.qual}
    </div>`;
  grid.appendChild(card);
});

// Add no-results placeholder
const noRes = document.createElement('div');
noRes.className = 'no-results';
noRes.innerHTML = `<div class="no-results-icon">∅</div><p>No faculty members match your search.</p>`;
grid.appendChild(noRes);

// ── Filter logic ──
let activeFilter = 'all';
let searchTerm = '';

function applyFilters() {
  const cards = grid.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    if (card.classList.contains('no-results')) return;
    const matchesFilter = activeFilter === 'all' || card.dataset.desig === activeFilter;
    const matchesSearch = !searchTerm ||
      card.dataset.name.includes(searchTerm) ||
      card.dataset.qual.includes(searchTerm);
    if (matchesFilter && matchesSearch) {
      card.classList.remove('hidden'); visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  document.getElementById('resultCount').textContent = visible;
  noRes.classList.toggle('show', visible === 0);
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  applyFilters();
});

document.getElementById('filterPills').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  applyFilters();
});
</script>
</body>
</html>
